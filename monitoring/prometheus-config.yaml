apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'uptime-kuma'
        static_configs:
          - targets: ['uptime-kuma:3001']
        basic_auth:
          username: 'jimmy.j'
          password: 'Jimmy@123'
        metrics_path: '/metrics'